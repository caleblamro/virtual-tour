<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Virtual Tour</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #app { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0; background: #000; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      font-family: -apple-system, sans-serif; font-size: 14px; z-index: 100;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none; position: fixed; inset: 0; background: #1a1a1a; color: #fff;
      flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px;
      font-family: -apple-system, sans-serif; text-align: center;
    }
    #error.visible { display: flex; }
    #controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
      padding: 8px 16px; border-radius: 20px; font-family: -apple-system, sans-serif;
      font-size: 12px; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading virtual tour…</p>
  </div>
  <div id="error">
    <p style="font-size:18px;font-weight:600">Failed to load tour</p>
    <p id="error-msg" style="color:rgba(255,255,255,0.6);font-size:13px;max-width:320px"></p>
    <button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:#fff;color:#000;border:none;border-radius:8px;cursor:pointer;font-size:14px">Retry</button>
  </div>
  <div id="app"></div>
  <div id="controls">WASD / touch joystick to walk · drag to look</div>

  <script type="module">
    // Parse URL params
    const params = new URLSearchParams(location.search);
    const contentUrl = params.get('content');
    const collisionUrl = params.get('collision');

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      const el = document.getElementById('error');
      document.getElementById('error-msg').textContent = msg;
      el.classList.add('visible');
    }

    if (!contentUrl) {
      showError('No tour content URL provided. Add ?content=<url> to the URL.');
    } else {
      // Dynamically load the PlayCanvas supersplat-viewer
      // Using the ESM CDN build
      import('https://cdn.jsdelivr.net/npm/@playcanvas/supersplat-viewer@latest/dist/index.mjs')
        .then(({ Application }) => {
          const app = document.getElementById('app');

          const viewer = new Application(app, {
            cameraMode: 'fly',       // walkable fly camera
            content: contentUrl,
            collision: collisionUrl ?? undefined,
          });

          viewer.on('load', () => {
            document.getElementById('loading').classList.add('hidden');
          });

          viewer.on('error', (err) => {
            showError(err?.message ?? 'Failed to load the splat file.');
          });
        })
        .catch((err) => {
          // Fallback: if the CDN import fails, show instructions
          showError(
            'Could not load viewer library. Check your internet connection and try again. ' +
            (err?.message ?? '')
          );
        });
    }
  </script>
</body>
</html>
