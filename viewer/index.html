<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Virtual Tour</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; background: #000; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      font-family: -apple-system, sans-serif; font-size: 14px; z-index: 100;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none; position: fixed; inset: 0; background: #1a1a1a; color: #fff;
      flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px;
      font-family: -apple-system, sans-serif; text-align: center;
    }
    #error.visible { display: flex; }
    #controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
      padding: 8px 16px; border-radius: 20px; font-family: -apple-system, sans-serif;
      font-size: 12px; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading virtual tour…</p>
  </div>
  <div id="error">
    <p style="font-size:18px;font-weight:600">Failed to load tour</p>
    <p id="error-msg" style="color:rgba(255,255,255,0.6);font-size:13px;max-width:320px"></p>
    <button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:#fff;color:#000;border:none;border-radius:8px;cursor:pointer;font-size:14px">Retry</button>
  </div>
  <div id="controls">Left-drag to orbit · right-drag to pan · scroll to zoom</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.6/build/gaussian-splats-3d.module.js"
      }
    }
  </script>

  <script type="module">
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const params = new URLSearchParams(location.search);
    const contentUrl = params.get('content');

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      const el = document.getElementById('error');
      document.getElementById('error-msg').textContent = msg;
      el.classList.add('visible');
    }

    if (!contentUrl) {
      showError('No content URL provided. Add ?content=<url> to the URL.');
    } else {
      const viewer = new GaussianSplats3D.Viewer({
        selfDrivenMode: true,
        useBuiltInControls: true,
        sharedMemoryForWorkers: false,
      });

      viewer.addSplatScene(contentUrl, {
        progressiveLoad: true,
        onProgress: (percent) => {
          const p = document.querySelector('#loading p');
          if (p) p.textContent = `Loading… ${Math.round(percent)}%`;
        },
      })
      .then(() => {
        document.getElementById('loading').classList.add('hidden');
        viewer.start();
      })
      .catch((err) => {
        showError(err?.message ?? 'Failed to load splat file.');
      });
    }
  </script>
</body>
</html>
